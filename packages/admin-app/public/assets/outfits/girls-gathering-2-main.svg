<svg xmlns="http://www.w3.org/2000/svg" width="750" height="1000" viewBox="0 0 750 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4E4"/><stop offset="50%" stop-color="#FCE4E4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#D4A0A0" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <!-- Base -->
  <rect width="750" height="1000" fill="url(#bg)"/>
  <rect width="750" height="1000" fill="url(#shine)"/>
  <!-- Subtle pattern -->
  <g opacity="0.06" fill="#D4A0A0">
    <circle cx="100" cy="150" r="80"/>
    <circle cx="650" cy="300" r="120"/>
    <circle cx="200" cy="700" r="90"/>
    <circle cx="600" cy="800" r="60"/>
  </g>
  <!-- Fashion silhouette -->
  <g transform="translate(375,340)" opacity="0.3" fill="#D4A0A0">
    <ellipse cx="0" cy="-70" rx="75" ry="85"/>
    <rect x="-55" y="20" width="110" height="200" rx="25"/>
    <path d="M-55,220 L-55,280 L-30,280 L-30,220 M30,220 L30,280 L55,280 L55,220" fill="#D4A0A0" opacity="0.5"/>
  </g>
  <!-- Bottom card -->
  <rect x="30" y="800" width="690" height="170" rx="20" fill="#ffffff" opacity="0.92"/>
  <text x="70" y="850" font-family="Plus Jakarta Sans, sans-serif" font-size="34" font-weight="800" fill="#1b1c1c">街头酷女孩</text>
  <!-- Occasion tag -->
  <rect x="70" y="870" width="120" height="32" rx="16" fill="#D4A0A0" opacity="0.15"/>
  <text x="130" y="893" font-family="Plus Jakarta Sans, sans-serif" font-size="18" font-weight="600" fill="#D4A0A0" text-anchor="middle">Brunch Vibes</text>
  <!-- Price -->
  <text x="680" y="910" font-family="Plus Jakarta Sans, sans-serif" font-size="38" font-weight="800" fill="#D4A0A0" text-anchor="end">¥undefined</text>
  <!-- Brand -->
  <text x="680" y="945" font-family="Plus Jakarta Sans, sans-serif" font-size="16" fill="#837377" text-anchor="end">逛逛AI · AI Fashion Curator</text>
</svg>