<svg xmlns="http://www.w3.org/2000/svg" width="750" height="1000" viewBox="0 0 750 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd9e4"/>
      <stop offset="100%" stop-color="#874c63" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="750" height="1000" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="150" cy="180" r="120" fill="#874c63" opacity="0.08"/>
  <circle cx="600" cy="800" r="200" fill="#874c63" opacity="0.06"/>
  <circle cx="580" cy="200" r="60" fill="#874c63" opacity="0.1"/>
  <!-- Mannequin silhouette -->
  <g transform="translate(375,340)" fill="#874c63" opacity="0.25">
    <ellipse cx="0" cy="-60" rx="70" ry="80"/>
    <rect x="-50" y="20" width="100" height="180" rx="20"/>
  </g>
  <!-- Style dots -->
  <g fill="#874c63" opacity="0.3">
    <circle cx="320" cy="250" r="4"/>
    <circle cx="340" cy="250" r="4"/>
    <circle cx="330" cy="270" r="4"/>
  </g>
  <!-- Bottom info bar -->
  <rect x="40" y="780" width="670" height="180" rx="24" fill="#ffffff" opacity="0.9"/>
  <!-- Outfit name -->
  <text x="80" y="840" font-family="Plus Jakarta Sans, sans-serif" font-size="36" font-weight="700" fill="#1b1c1c">甜酷休闲约会</text>
  <!-- Occasion badge -->
  <rect x="80" y="865" width="110" height="36" rx="18" fill="#874c63" opacity="0.15"/>
  <text x="135" y="890" font-family="Plus Jakarta Sans, sans-serif" font-size="20" fill="#874c63" text-anchor="middle" font-weight="600">周末约会</text>
  <!-- Price -->
  <text x="630" y="900" font-family="Plus Jakarta Sans, sans-serif" font-size="42" font-weight="800" fill="#874c63" text-anchor="end">¥848</text>
  <!-- Brand line -->
  <text x="650" y="940" font-family="Plus Jakarta Sans, sans-serif" font-size="18" fill="#837377" text-anchor="end">逛逛AI · AI穿搭推荐</text>
</svg>